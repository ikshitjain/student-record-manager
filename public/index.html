<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Student Record Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-container">
  <div style="flex: 1; display: flex; flex-direction: column;">
    
    <header class="app-header">
      <a class="brand" href="/">
        <i>🏫</i> StudentVault
      </a>
      
      <div class="header-actions">
        <div class="user-profile">
          <div class="avatar" id="userAvatar"></div>
          <span id="greetingText"></span>
          <span id="adminBadge" style="display: none;"></span>
        </div>
        <button id="adminPanelBtn" class="btn btn-outline btn-sm" onclick="window.location.href='/admin.html'" style="display: none;">Admin Panel</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </header>

    <main>
      <div class="page-header">
        <h2>Dashboard Overview</h2>
        <p>Manage student records, view statistics, and add new enrollments.</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Total Enrollments</span>
          <span class="stat-value" id="totalStudents">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Active Programs</span>
          <span class="stat-value" id="totalCourses">0</span>
        </div>
      </div>

      <div class="card-panel">
        <h3 class="card-title">Add New Record</h3>
        <form id="addStudentForm" onsubmit="event.preventDefault(); addStudent();">
          <div class="form-grid">
            <div class="input-grp">
              <label for="name">Full Name</label>
              <input type="text" id="name" placeholder="John Doe" required />
            </div>
            <div class="input-grp">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="john@example.com" required />
            </div>
            <div class="input-grp">
              <label for="course">Program</label>
              <input type="text" id="course" placeholder="Computer Science" required />
            </div>
            <div class="input-grp">
              <button type="submit" id="addBtn" class="btn btn-primary" style="height: 42px;">Save Record</button>
            </div>
          </div>
        </form>
      </div>

      <div class="table-wrapper">
        <div class="table-header-ops">
          <span class="table-title">Student Database</span>
          <div class="search-box">
            <i>🔍</i>
            <input type="text" id="searchInput" placeholder="Search by name, email, or program..." oninput="filterStudents()" />
          </div>
        </div>
        <table id="studentTable">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Email Address</th>
              <th>Program</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <!-- populated by JS -->
          </tbody>
        </table>
      </div>

    </main>

    <footer>
      StudentVault Dashboard © 2025. All Rights Reserved.
    </footer>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
</body>
</html>
