<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — StudentVault</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<div class="app-container">
  <div style="flex: 1; display: flex; flex-direction: column;">
    
    <header class="app-header">
      <a class="brand" href="/">
        <i>🏫</i> StudentVault
      </a>
      
      <div class="header-actions">
        <div class="user-profile">
          <div class="avatar" id="userAvatar"></div>
          <span id="greetingText"></span>
          <span id="adminBadge" style="display: none;"></span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="window.location.href='/'">Dashboard</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </header>

    <main>
      <div class="page-header">
        <h2>User Management</h2>
        <p>Manage system access, roles, and connected accounts.</p>
      </div>

      <div class="table-wrapper">
        <div class="table-header-ops">
          <span class="table-title">System Users</span>
        </div>
        <table id="usersTable">
          <thead>
            <tr>
              <th>Account Details</th>
              <th>Managed Records</th>
              <th>Role</th>
              <th style="text-align: right;">Permissions & Status</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- populated by JS -->
          </tbody>
        </table>
      </div>

    </main>

    <footer>
      StudentVault Admin Control © 2025. All Rights Reserved.
    </footer>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
</body>
</html>
